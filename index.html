<style>
  *{box-sizing:border-box;font-family:Microsoft JhengHei,sans-serif}
  html,body{margin:0;padding:0;width:100%;height:100%;background:#f4f8ff;}
  body{position:relative;padding:10px;}
  .card{background:rgba(255,255,255,0.97);border-radius:20px;padding:16px;max-width:500px;width:100%;margin:0 auto;box-shadow:0 0 10px rgba(0,0,0,0.1);}

function simplifyNumber(n) {
  if (n <= 0) return "0";
  let coeff = 1, radicand = n;
  for (let i = 2; i * i <= radicand; i++) {
    while (radicand % (i * i) === 0) { coeff *= i; radicand /= (i * i); }
  }
  if (radicand === 1) return coeff.toString();
  return (coeff === 1 ? "" : coeff) + "√" + radicand;
}

function isSimplifiableSurd(n) {
  if (n <= 0) return false;
  if (Math.sqrt(n) % 1 === 0) return false; 
  for (let i = 2; i * i <= n; i++) {
    if (n % (i * i) === 0) return true; 
  }
  return false; 
}

function rotatePt(x, y, angle) {
  const rad = angle * Math.PI / 180;
  const cx = 120, cy = 100; 
  const nx = cx + (x - cx) * Math.cos(rad) - (y - cy) * Math.sin(rad);
  const ny = cy + (x - cx) * Math.sin(rad) + (y - cy) * Math.cos(rad);
  return {x: nx, y: ny};
}

function toLatex(raw) {
  if (!raw) return "";
  let s = raw.toString().replace(/√\(([^)]+)\)/g, "\\sqrt{$1}")
             .replace(/√([0-9]+)/g, "\\sqrt{$1}")
             .replace(/×/g, "\\times ");
  
  s = s.replace(/([0-9]+)°/g, "{\\small $1}{\\Large^\\circ}");
  return s;
}

function makeText(x, y, val) {
  if (!val) return "";
  const isX = val === 'x' || val.toString().includes('x');
  const color = isX ? '#ff4444' : '#333';
  
  let valToRender = isX && val === 'x' ? `\\mathbf{x}` : val;
  let htmlStr = valToRender;
  try {
    htmlStr = katex.renderToString(toLatex(valToRender), { throwOnError: false });
  } catch(e) {
    htmlStr = valToRender;
  }

  return `<foreignObject x="${x - 50}" y="${y - 30}" width="100" height="60" style="overflow:visible;">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:${color}; font-size:22px; line-height:1;">
      ${htmlStr}
    </div>
  </foreignObject>`;
}

// 🎯 題型一：一般圖形題
function genPythagorean() {
  const solveFor = Math.random() < 0.5 ? 0 : 1; 
  let aLabel, bLabel, cLabel;
  let targetSquared;

  if (solveFor === 0) { 
    let a, b;
    do {
      a = Math.floor(Math.random() * 12) + 2; 
      b = Math.floor(Math.random() * 12) + 2; 
      targetSquared = a * a + b * b;
    } while (!isSimplifiableSurd(targetSquared));
    aLabel = a; bLabel = b; cLabel = "x";
  } else { 
    let c, knownLeg;
    do {
      c = Math.floor(Math.random() * 15) + 4; 
      knownLeg = Math.floor(Math.random() * (c - 2)) + 2; 
      targetSquared = c * c - knownLeg * knownLeg;
    } while (!isSimplifiableSurd(targetSquared));
    
    if (Math.random() < 0.5) {
      aLabel = "x"; bLabel = knownLeg; cLabel = c;
    } else {
      aLabel = knownLeg; bLabel = "x"; cLabel = c;
    }
  }

  ans = simplifyNumber(targetSquared);
  const theta = Math.floor(Math.random() * 36) * 10;
  
  const pVert = rotatePt(40, 100, theta);   
  const pHoriz = rotatePt(120, 170, theta); 
  const pHypo = rotatePt(140, 75, theta);  

  const svgHTML = `
    <svg width="240" height="200" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
        <g transform="rotate(${theta}, 120, 100)">
            <polygon points="60,50 60,160 180,160" fill="rgba(55,140,249,0.05)" stroke="#378cf9" stroke-width="4" stroke-linejoin="round"/>
            <polyline points="60,148 72,148 72,160" fill="none" stroke="#378cf9" stroke-width="2.5"/>
        </g>
        ${makeText(pVert.x, pVert.y, aLabel)}
        ${makeText(pHoriz.x, pHoriz.y, bLabel)}
        ${makeText(pHypo.x, pHypo.y, cLabel)}
    </svg>
    <div id="type1-math-container"></div>
  `;
  return svgHTML;
}

// 🎯 題型二：圖形特殊角
function genSpecialTriangle() {
  const is45 = Math.random() < 0.5;
  let aLabel = "", bLabel = "", cLabel = "";
  const k = Math.floor(Math.random() * 8) + 2;
  let ansStr = "";

  if (is45) {
    const scenario = Math.floor(Math.random() * 3);
    if (scenario === 0) {
      aLabel = k; bLabel = k; cLabel = "x"; ansStr = k + "√2";
    } else if (scenario === 1) {
      aLabel = "x"; bLabel = ""; cLabel = 2 * k; ansStr = k + "√2";
    } else {
      aLabel = "x"; bLabel = ""; cLabel = k + "√2"; ansStr = k.toString();
    }
  } else {
    const scenario = Math.floor(Math.random() * 6);
    if (scenario === 0) {
      aLabel = k; bLabel = ""; cLabel = "x"; ansStr = (2 * k).toString();
    } else if (scenario === 1) {
      aLabel = k; bLabel = "x"; cLabel = ""; ansStr = k + "√3";
    } else if (scenario === 2) {
      aLabel = "x"; bLabel = ""; cLabel = 2 * k; ansStr = k.toString();
    } else if (scenario === 3) {
      aLabel = ""; bLabel = "x"; cLabel = 2 * k; ansStr = k + "√3";
    } else if (scenario === 4) {
      aLabel = "x"; bLabel = k + "√3"; cLabel = ""; ansStr = k.toString();
    } else {
      aLabel = ""; bLabel = k + "√3"; cLabel = "x"; ansStr = (2 * k).toString();
    }
  }

  ans = ansStr;
  const theta = Math.floor(Math.random() * 36) * 10;
  const cx = 120, cy = 100;
  let svgHTML = "";

  if (is45) {
    const pVert = rotatePt(55, 100, theta);
    const pHoriz = rotatePt(120, 165, theta);
    const pHypo = rotatePt(135, 85, theta);
    const pAngle = rotatePt(145, 145, theta);

    svgHTML = `
      <svg width="240" height="200" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
          <g transform="rotate(${theta}, ${cx}, ${cy})">
              <polygon points="70,55 70,155 170,155" fill="rgba(55,140,249,0.05)" stroke="#378cf9" stroke-width="4" stroke-linejoin="round"/>
              <polyline points="70,143 82,143 82,155" fill="none" stroke="#378cf9" stroke-width="2.5"/>
              <path d="M 145,155 A 25,25 0 0,1 152.3,137.3" fill="none" stroke="#378cf9" stroke-width="2"/>
          </g>
          ${aLabel ? makeText(pVert.x, pVert.y, aLabel) : ""}
          ${bLabel ? makeText(pHoriz.x, pHoriz.y, bLabel) : ""}
          ${cLabel ? makeText(pHypo.x, pHypo.y, cLabel) : ""}
          ${makeText(pAngle.x, pAngle.y, "45°")}
      </svg>
      <div id="type1-math-container"></div>
    `;
  } else {
    const pVert = rotatePt(35, 105, theta);
    const pHoriz = rotatePt(115, 175, theta);
    const pHypo = rotatePt(135, 85, theta);
    const pAngle = rotatePt(160, 150, theta);

    svgHTML = `
      <svg width="240" height="200" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
          <g transform="rotate(${theta}, ${cx}, ${cy})">
              <polygon points="50,60 50,160 200,160" fill="rgba(55,140,249,0.05)" stroke="#378cf9" stroke-width="4" stroke-linejoin="round"/>
              <polyline points="50,148 62,148 62,160" fill="none" stroke="#378cf9" stroke-width="2.5"/>
              <path d="M 170,160 A 30,30 0 0,1 174,145.2" fill="none" stroke="#378cf9" stroke-width="2"/>
          </g>
          ${aLabel ? makeText(pVert.x, pVert.y, aLabel) : ""}
          ${bLabel ? makeText(pHoriz.x, pHoriz.y, bLabel) : ""}
          ${cLabel ? makeText(pHypo.x, pHypo.y, cLabel) : ""}
          ${makeText(pAngle.x, pAngle.y, "30°")}
      </svg>
      <div id="type1-math-container"></div>
    `;
  }
  return svgHTML;
}

// 🎯 題型三：純文字應用題
function genTextProblem() {
  const letterSets = [['A', 'B', 'C'], ['P', 'Q', 'R'], ['X', 'Y', 'Z']];
  let L = letterSets[Math.floor(Math.random() * letterSets.length)];
  
  // 隨機打亂頂點順序，讓哪一個角是直角不固定
  for(let i=2; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [L[i], L[j]] = [L[j], L[i]];
  }
  let L1 = L[0], L2 = L[1], L3 = L[2]; 
  // 固定讓 L3 為直角。斜邊 = L1 L2，直角邊 = L1 L3, L2 L3
  
  let isSpecial = Math.random() < 0.5;
  let htmlStr = "";
  let askText = "";
  
  if (!isSpecial) {
      // 題型 3-A：一般給兩邊求第三邊
      const solveFor = Math.random() < 0.5 ? 0 : 1;
      let targetSquared;
      let known1, known2, askSide;
      let val1, val2;
      
      if (solveFor === 0) { // 求斜邊
          let a, b;
          do {
            a = Math.floor(Math.random() * 12) + 2; 
            b = Math.floor(Math.random() * 12) + 2; 
            targetSquared = a * a + b * b;
          } while (!isSimplifiableSurd(targetSquared));
          known1 = L1 + L3; val1 = a;
          known2 = L2 + L3; val2 = b;
          askSide = L1 + L2;
      } else { // 求直角邊
          let c, knownLeg;
          do {
            c = Math.floor(Math.random() * 15) + 4; 
            knownLeg = Math.floor(Math.random() * (c - 2)) + 2; 
            targetSquared = c * c - knownLeg * knownLeg;
          } while (!isSimplifiableSurd(targetSquared));
          
          if(Math.random() < 0.5){
              known1 = L1 + L2; val1 = c;
              known2 = L1 + L3; val2 = knownLeg;
              askSide = L2 + L3;
          } else {
              known1 = L1 + L2; val1 = c;
              known2 = L2 + L3; val2 = knownLeg;
              askSide = L1 + L3;
          }
      }
      ans = simplifyNumber(targetSquared);
      
      htmlStr = `
          <div style="font-size:22px; padding:15px; margin-bottom:10px; line-height:1.8; text-align:left; color:#333; width: 100%; border: 2px dashed #378cf9; border-radius: 12px; background: rgba(55,140,249,0.02);">
              在直角 $\\triangle ${L1}${L2}${L3}$ 中，$\\angle ${L3} = 90^\\circ$。<br>
              已知 $${known1} = ${val1}$，$${known2} = ${val2}$。<br>
              求 $${askSide}$ 的長度。
          </div>
          <div id="type1-math-container"></div>
      `;
      askText = `${askSide} = ?`;
      
  } else {
      // 題型 3-B：特殊角 (30/45/60)
      const is45 = Math.random() < 0.5;
      const k = Math.floor(Math.random() * 8) + 2;
      let ansStr = "";
      let angleText = "";
      let knownText = "";
      let askSide = "";
      
      if (is45) {
          angleText = `\\angle ${L1} = 45^\\circ`;
          const scenario = Math.floor(Math.random() * 3);
          if (scenario === 0) { // 給股求斜邊
            knownText = `$${L1}${L3} = ${k}$`;
            askSide = L1 + L2;
            ansStr = k + "√2";
          } else if (scenario === 1) { // 給整數斜邊求股
            knownText = `$${L1}${L2} = ${2*k}$`;
            askSide = L1 + L3;
            ansStr = k + "√2";
          } else { // 給根號斜邊求股
            knownText = `$${L1}${L2} = ${k}√2$`;
            askSide = L2 + L3;
            ansStr = k.toString();
          }
      } else {
          const is30 = Math.random() < 0.5;
          if(is30) {
              angleText = `\\angle ${L1} = 30^\\circ`;
              const scenario = Math.floor(Math.random() * 6);
              if (scenario === 0) {
                knownText = `$${L2}${L3} = ${k}$`; askSide = L1 + L2; ansStr = (2 * k).toString();
              } else if (scenario === 1) {
                knownText = `$${L2}${L3} = ${k}$`; askSide = L1 + L3; ansStr = k + "√3";
              } else if (scenario === 2) {
                knownText = `$${L1}${L2} = ${2 * k}$`; askSide = L2 + L3; ansStr = k.toString();
              } else if (scenario === 3) {
                knownText = `$${L1}${L2} = ${2 * k}$`; askSide = L1 + L3; ansStr = k + "√3";
              } else if (scenario === 4) {
                knownText = `$${L1}${L3} = ${k}√3$`; askSide = L2 + L3; ansStr = k.toString();
              } else {
                knownText = `$${L1}${L3} = ${k}√3$`; askSide = L1 + L2; ansStr = (2 * k).toString();
              }
          } else {
              angleText = `\\angle ${L1} = 60^\\circ`;
              const scenario = Math.floor(Math.random() * 6);
              if (scenario === 0) {
                knownText = `$${L1}${L3} = ${k}$`; askSide = L1 + L2; ansStr = (2 * k).toString();
              } else if (scenario === 1) {
                knownText = `$${L1}${L3} = ${k}$`; askSide = L2 + L3; ansStr = k + "√3";
              } else if (scenario === 2) {
                knownText = `$${L1}${L2} = ${2 * k}$`; askSide = L1 + L3; ansStr = k.toString();
              } else if (scenario === 3) {
                knownText = `$${L1}${L2} = ${2 * k}$`; askSide = L2 + L3; ansStr = k + "√3";
              } else if (scenario === 4) {
                knownText = `$${L2}${L3} = ${k}√3$`; askSide = L1 + L3; ansStr = k.toString();
              } else {
                knownText = `$${L2}${L3} = ${k}√3$`; askSide = L1 + L2; ansStr = (2 * k).toString();
              }
          }
      }
      ans = ansStr;
      
      htmlStr = `
          <div style="font-size:22px; padding:15px; margin-bottom:10px; line-height:1.8; text-align:left; color:#333; width: 100%; border: 2px dashed #378cf9; border-radius: 12px; background: rgba(55,140,249,0.02);">
              在直角 $\\triangle ${L1}${L2}${L3}$ 中，$\\angle ${L3} = 90^\\circ$。<br>
              已知 $${angleText}$，且 ${knownText}。<br>
              求 $${askSide}$ 的長度。
          </div>
          <div id="type1-math-container"></div>
      `;
      askText = `${askSide} = ?`;
  }
  
  // 利用正則表達式把 $$ 裡面的字串挑出來讓 KaTeX 渲染，文字排版會非常精美
  htmlStr = htmlStr.replace(/\$([^\$]+)\$/g, (match, p1) => katex.renderToString(toLatex(p1), {throwOnError:false}));
  
  return { html: htmlStr, askText: askText };
}


function renderInput() {
  const div = document.getElementById("input-display");
  if (!currentInput) { div.innerHTML = '<span style="color:#ccc; font-size:18px;">請輸入答案...</span>'; return; }
  try { katex.render(toLatex(currentInput), div, { throwOnError: false }); } catch(e) { div.textContent = currentInput; }
}

function normalizeStr(str) {
  if (!str || str.trim() === "") return "EMPTY_INPUT";
  let s = str.replace(/\s+/g, ""); 
  if (!s.startsWith("-") && !s.startsWith("+")) s = "+" + s;
  let termRegex = /[+-][^+-]+/g, terms = s.match(termRegex);
  if (!terms) return "EMPTY_INPUT";
  let normalizedTerms = terms.map(t => {
    let sign = t[0], body = t.substring(1);
    if (body === "0") return "+0"; 
    let parts = body.split("√"), out = parts[0] || "", inn = parts[1] || "";
    if (out === "" && parts.length > 1) out = "1";
    return sign + out + (parts.length > 1 ? "√" + inn : "");
  });
  normalizedTerms = normalizedTerms.filter(t => t !== "+0" && t !== "-0");
  if (normalizedTerms.length === 0) return "0";
  normalizedTerms.sort();
  let res = normalizedTerms.join("");
  if (res.startsWith("+")) res = res.substring(1);
  return res;
}

function insert(v) { if(locked || !gameStarted) return; currentInput += v; renderInput(); }
function backspace() { if(locked || !gameStarted || currentInput.length === 0) return; currentInput = currentInput.slice(0,-1); renderInput(); }
function clearAll() { if(locked || !gameStarted) return; currentInput = ""; renderInput(); }

function check() {
  if (locked || !gameStarted) return;
  locked = true; 
  const checkBtn = document.getElementById("checkBtn");
  if (checkBtn) checkBtn.disabled = true;
  totalQ++;
  let userNorm = normalizeStr(currentInput), ansNorm = normalizeStr(ans);
  if (userNorm === ansNorm && userNorm !== "EMPTY_INPUT") {
    score += currentMul; correctQ++; streak++;
    document.getElementById("msg").textContent = "正確！ +" + currentMul;
    if ((streak >= 3 && Math.random() < 0.5) || (streak === 2 && Math.random() < 0.1)) {
        if(luck < 2) { luck++; setTimeout(() => { document.getElementById("msg").textContent = "幸運卡 +1！"; }, 800); }
    }
    setTimeout(next, 1500);
  } else {
    streak = 0; score = Math.max(0, score - currentMul);
    const msgDom = document.getElementById("msg");
    msgDom.innerHTML = '<span>答錯，正解：</span><span id="correct-ans-latex"></span>';
    katex.render(toLatex(ans), document.getElementById("correct-ans-latex"), { throwOnError: false });
    document.getElementById("nextBtn").style.display = "block";
  }
  updateUI();
}

function next() {
  locked = false; currentInput = ""; currentMul = 1;
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("msg").innerHTML = "";
  document.getElementById("checkBtn").disabled = false;
  
  let qDataHtml = "";
  let askText = "x = ?";
  
  if (level === 1) {
    qDataHtml = genPythagorean();
  } else if (level === 2) {
    qDataHtml = genSpecialTriangle();
  } else if (level === 3) {
    const res = genTextProblem();
    qDataHtml = res.html;
    askText = res.askText;
  }
  
  document.getElementById("q").innerHTML = qDataHtml;
  katex.render(askText, document.getElementById("type1-math-container"), { throwOnError: false });
  renderInput(); 
}

function updateUI() {
  document.getElementById("score").textContent = score;
  document.getElementById("luck").textContent = luck;
  document.getElementById("correctCount").textContent = correctQ;
  document.getElementById("rate").textContent = totalQ === 0 ? "0%" : Math.round(correctQ/totalQ*100) + "%";
}

function setLevel(n) {
  if (gameStarted) return;
  level = n;
  document.querySelectorAll(".level button").forEach((b,i)=>b.classList.toggle("on", i===n-1));
  updateStartBtn();
}

function updateStartBtn() {
  const c = document.getElementById("className").value;
  const i = document.getElementById("studentId").value;
  const n = document.getElementById("studentName").value;
  document.getElementById("startBtn").disabled = !(c && i && n && level);
}

function updateStudentList() {
  const cname = document.getElementById("className").value, sel = document.getElementById("studentId"), nameInput = document.getElementById("studentName");
  sel.innerHTML = '<option value="">請選學號</option>'; nameInput.value = "";
  if (!cname) { sel.disabled = true; return; }
  sel.disabled = false;
  (studentData[cname] || []).forEach(s => { let opt = document.createElement("option"); opt.value = s.id; opt.textContent = s.id; sel.appendChild(opt); });
  updateStartBtn();
}

function autoFillName() {
  const cname = document.getElementById("className").value, sid = document.getElementById("studentId").value;
  const stu = (studentData[cname] || []).find(s => s.id === sid);
  document.getElementById("studentName").value = stu ? stu.name : "";
  updateStartBtn();
}

function startGame() { 
  gameStarted = true; 
  ["className","studentId","studentName","startBtn", "lv1", "lv2", "lv3"].forEach(id => {
      let el = document.getElementById(id);
      if(el) el.disabled = true;
  });
  startTime = Date.now(); 
  timer = setInterval(() => { 
    let s = Math.floor((Date.now()-startTime)/1000); 
    document.getElementById("time").textContent = Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); 
  }, 1000); 
  next(); 
}

function useLuck() { 
  if(!gameStarted || locked || luck < 1) return; 
  luck--; currentMul = Math.random()>0.5 ? 2 : 3; 
  document.getElementById("msg").textContent = "幸運卡生效！本題分數 ×" + currentMul; 
  updateUI(); 
}

function uploadScore() {
  if (!gameStarted) return alert("請先開始答題");
  const uploadBtn = document.getElementById("uploadBtn");
  uploadBtn.disabled = true;
  let cooldown = 60;
  let cdTimer = setInterval(() => {
    uploadBtn.textContent = `冷卻 ${--cooldown}s`;
    if (cooldown <= 0) { clearInterval(cdTimer); uploadBtn.disabled = false; uploadBtn.textContent = "上傳"; }
  }, 1000);

  const data = {
    action: "saveScore",
    className: document.getElementById("className").value,
    studentId: document.getElementById("studentId").value,
    studentName: document.getElementById("studentName").value,
    score: score, correct: correctQ,
    rate: totalQ === 0 ? "0" : (correctQ / totalQ * 100).toFixed(1),
    level: "題型" + level,
    timeSec: Math.floor((Date.now() - startTime) / 1000)
  };

  fetch("https://script.google.com/macros/s/AKfycbyHFGxezML6QQsxvYDIR7t9nx28549ZcxukGITGCpSTH0dmJAYnOIcypGZrJKWELSUl/exec", {
    method: "POST", mode: "no-cors", body: JSON.stringify(data)
  }).then(() => alert("上傳成功！")).catch(() => { alert("上傳失敗"); clearInterval(cdTimer); uploadBtn.disabled = false; uploadBtn.textContent = "上傳"; });
}
